apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: go-backend
  title: Go Backend Service
  description: Servicio HTTP en Go con arquitectura hexagonal, chi router, slog, Docker y pipelines de GitHub Actions
  tags:
    - go
    - kubernetes
    - hexagonal
spec:
  owner: group:default/platform-team
  type: service

  parameters:
    - title: Información del servicio
      required:
        - name
        - port
      properties:
        name:
          title: Nombre del servicio
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          description: Nombre del repositorio y del servicio
          ui:autofocus: true
          ui:help: Solo minúsculas, números y guiones. Ej. payment-service
        description:
          title: Descripción
          type: string
          description: Descripción breve del propósito del servicio
        port:
          title: Puerto HTTP
          type: integer
          default: 8080
          description: Puerto en el que escuchará el servicio

  steps:
    - id: fetch
      name: Generar archivos del skeleton
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutRender:
          - .github/**
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          port: ${{ parameters.port }}
          repoOwner: ${{ appConfig.scaffolder.githubOrg }}

    - id: publish
      name: Publicar en GitHub
      action: publish:github:configured
      input:
        repoName: ${{ parameters.name }}
        description: ${{ parameters.description or 'Servicio HTTP en Go - ' + parameters.name }}
        gitCommitMessage: "chore: initial scaffold from go-backend template"
        topics:
          - go
          - backend

    - id: register
      name: Registrar en el catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repositorio en GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Ver en el catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
