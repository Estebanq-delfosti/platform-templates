apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: rust-library
  title: Rust Library (Crate)
  description: Crea una librería Rust (crate) publicable en crates.io
  tags:
    - rust
    - library
    - crate
spec:
  owner: group:default/platform-team
  type: library

  parameters:
    - title: Información de la librería
      required:
        - name
      properties:
        name:
          title: Nombre del crate
          type: string
          pattern: '^[a-z][a-z0-9_-]*$'
          description: Nombre del crate Rust (snake_case o kebab-case)
          ui:autofocus: true
          ui:help: Ej. my-utils o my_utils
        description:
          title: Descripción
          type: string
          default: ''
          description: Descripción breve del crate

  steps:
    - id: fetch
      name: Generar archivos del skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          repoOwner: ${{ appConfig.scaffolder.githubOrg }}

    - id: publish
      name: Publicar en GitHub
      action: publish:github:configured
      input:
        repoName: ${{ parameters.name }}
        description: Rust crate - ${{ parameters.name }}
        gitCommitMessage: "chore: initial scaffold from rust-library template"
        topics:
          - rust
          - library

    - id: register
      name: Registrar en el catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repositorio en GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Ver en el catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
