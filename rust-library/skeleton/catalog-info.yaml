apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  tags:
    - rust
    - library
    - crate
  annotations:
    github.com/project-slug: ${{ values.repoOwner }}/${{ values.name }}
spec:
  type: library
  lifecycle: experimental
  owner: group:default/platform-team
