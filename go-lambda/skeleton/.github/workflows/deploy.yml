{% raw %}name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || vars.AWS_PLATFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build & Package
        run: just build && just package

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve

      - name: Bootstrap (first run only)
        if: vars.AWS_ROLE_ARN == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROLE_ARN=$(terraform -chdir=infra output -raw github_deploy_role_arn)
          gh variable set AWS_ROLE_ARN --body "$ROLE_ARN"
{% endraw %}
