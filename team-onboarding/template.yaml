apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: team-onboarding
  title: Onboarding de Equipo
  description: >
    Registra un nuevo equipo (interno o sub-equipo de cliente) en el portal
    y lo vincula a la jerarquía correcta mediante un Pull Request.
  tags:
    - team
    - onboarding
    - group
spec:
  owner: group:default/platform-team
  type: documentation

  parameters:
    - title: Información del Equipo
      required:
        - teamName
        - teamTitle
        - teamType
        - parentGroup
      properties:
        teamName:
          title: Identificador del Equipo (slug)
          type: string
          description: >
            Identificador único sin espacios ni mayúsculas. Ej: acme-backend-team, delivery-squad-a.
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        teamTitle:
          title: Nombre del Equipo
          type: string
          description: Nombre descriptivo del equipo.
        teamType:
          title: Tipo de Equipo
          type: string
          enum:
            - team
            - squad
            - chapter
          enumNames:
            - Team (equipo estable)
            - Squad (equipo ágil)
            - Chapter (comunidad de práctica)
          default: team
        parentGroup:
          title: Grupo Padre
          type: string
          description: Cliente o departamento al que pertenece este equipo.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Group
                spec.type: client
              - kind: Group
                spec.type: department
        teamDescription:
          title: Descripción del Equipo
          type: string
          description: Misión y responsabilidades del equipo.
          ui:widget: textarea
          ui:options:
            rows: 3
        teamMembers:
          title: Miembros Iniciales
          type: array
          description: >
            Consultores que formarán parte de este equipo.
            Puedes dejarlo vacío y asignarlos después.
          ui:options:
            orderable: false
          items:
            type: string
            ui:field: EntityPicker
            ui:options:
              catalogFilter:
                - kind: User
        teamEmail:
          title: Email del Equipo
          type: string
          format: email
          description: Email de contacto del equipo (opcional).

  steps:
    - id: fetch-template
      name: Generar definición del equipo
      action: fetch:template
      input:
        url: ./skeleton
        values:
          teamName: ${{ parameters.teamName }}
          teamTitle: ${{ parameters.teamTitle }}
          teamType: ${{ parameters.teamType }}
          parentGroup: ${{ parameters.parentGroup }}
          teamDescription: ${{ parameters.teamDescription }}
          teamMembers: ${{ parameters.teamMembers }}
          teamEmail: ${{ parameters.teamEmail }}

    - id: create-pr
      name: Crear Pull Request en platform-core
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Delfosti-Platform&repo=platform-core
        branchName: team/add-${{ parameters.teamName }}
        title: "feat: add team ${{ parameters.teamTitle }}"
        description: |
          Nuevo equipo registrado via Backstage Scaffolder.

          - **Equipo:** ${{ parameters.teamTitle }}
          - **Tipo:** ${{ parameters.teamType }}
          - **Grupo padre:** ${{ parameters.parentGroup }}
        targetPath: clients/_per-client/${{ parameters.parentGroup | replace('group:default/', '') }}/teams

    - id: notify
      name: Notificar registro del equipo
      action: notification:send
      continueOnError: true
      input:
        recipients: broadcast
        title: "Nuevo equipo registrado: ${{ parameters.teamTitle }}"
        info: >
          El equipo ${{ parameters.teamTitle }} ha sido registrado en el portal.
          PR: ${{ steps['create-pr'].output.remoteUrl }}
        severity: normal

  output:
    links:
      - title: Pull Request
        icon: github
        url: ${{ steps['create-pr'].output.remoteUrl }}
