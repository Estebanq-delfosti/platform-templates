apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: angular-frontend
  title: Angular Frontend
  description: Crea una SPA Angular con Angular CLI y Dockerfile Nginx
  tags:
    - angular
    - typescript
spec:
  owner: group:default/platform-team
  type: website

  parameters:
    # ── Paso 1: Información de la aplicación ──────────────────────────────────
    - title: Información de la aplicación
      required:
        - name
      properties:
        name:
          title: Nombre de la aplicación
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          description: Nombre del repositorio y de la aplicación
          ui:autofocus: true
          ui:help: Solo minúsculas, números y guiones. Ej. my-app

    # ── Paso 2: Organización ──────────────────────────────────────────────────
    - title: Organización
      required:
        - githubOrg
      properties:
        githubOrg:
          title: Organización de GitHub
          type: string
          description: >
            Organización donde se creará el repositorio.
            Solo aparecen organizaciones gestionadas por delfosti-infra.
          ui:field: SelectFieldFromApi
          ui:options:
            path: 'scaffolder/v2/actions/github:org:list'
            valueSelector: 'orgs[].login'
            labelSelector: 'orgs[].login'

    # ── Paso 3: Team ──────────────────────────────────────────────────────────
    - title: Team
      required:
        - teamAction
      properties:
        teamAction:
          title: ¿Qué deseas hacer con el team?
          type: string
          enum:
            - existing
            - new
          enumNames:
            - Usar un team existente
            - Crear un team nuevo
          default: existing

      dependencies:
        teamAction:
          oneOf:
            # Si elige team existente → muestra dropdown con teams de la org
            - properties:
                teamAction:
                  const: existing
                existingTeam:
                  title: Selecciona el team
                  type: string
                  description: Teams disponibles en la organización seleccionada
                  ui:field: SelectFieldFromApi
                  ui:options:
                    path: 'scaffolder/v2/actions/github:team:list'
                    params:
                      org: '{{ parameters.githubOrg }}'
                    valueSelector: 'teams[].slug'
                    labelSelector: 'teams[].name'
              required:
                - existingTeam

            # Si elige team nuevo → muestra campos para crearlo
            - properties:
                teamAction:
                  const: new
                newTeamName:
                  title: Nombre del nuevo team
                  type: string
                  pattern: '^[a-z][a-z0-9-]*$'
                  description: >
                    Slug del team a crear. Solo minúsculas, números y guiones.
                    Ej. acme-frontend
                  ui:help: Solo minúsculas, números y guiones. Ej. acme-frontend
                newTeamDescription:
                  title: Descripción del team
                  type: string
                  description: Descripción opcional del team
              required:
                - newTeamName

  steps:
    # ── 1. Generar archivos del skeleton ──────────────────────────────────────
    - id: fetch
      name: Generar archivos del skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          repoOwner: ${{ parameters.githubOrg }}

    # ── 2. Publicar repositorio en GitHub ─────────────────────────────────────
    - id: publish
      name: Publicar en GitHub
      action: publish:github:configured
      input:
        repoName: ${{ parameters.name }}
        org: ${{ parameters.githubOrg }}
        description: Angular frontend - ${{ parameters.name }}
        gitCommitMessage: 'chore: initial scaffold from angular-frontend template'
        topics:
          - angular
          - typescript
          - frontend

    # ── 3a. Usar team existente ───────────────────────────────────────────────
    - id: ensure-team-existing
      name: Asignar repo a team existente
      if: ${{ parameters.teamAction === 'existing' }}
      action: github:team:ensure
      input:
        org: ${{ parameters.githubOrg }}
        teamName: ${{ parameters.existingTeam }}
        repoName: ${{ parameters.name }}

    # ── 3b. Crear team nuevo ──────────────────────────────────────────────────
    - id: ensure-team-new
      name: Crear team nuevo y asignar repo
      if: ${{ parameters.teamAction === 'new' }}
      action: github:team:ensure
      input:
        org: ${{ parameters.githubOrg }}
        teamName: ${{ parameters.newTeamName }}
        teamDescription: ${{ parameters.newTeamDescription }}
        repoName: ${{ parameters.name }}

    # ── 4. Registrar en el catálogo de Backstage ──────────────────────────────
    - id: register
      name: Registrar en el catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repositorio en GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Team en GitHub
        url: ${{ steps['ensure-team-existing'].output.teamUrl }}
      - title: Ver en el catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
