apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: angular-frontend
  title: Angular Frontend
  description: Crea una SPA Angular con Angular CLI y Dockerfile Nginx
  tags:
    - angular
    - typescript
spec:
  owner: group:default/platform-team
  type: website

  parameters:
    - title: Información de la aplicación
      required:
        - name
      properties:
        name:
          title: Nombre de la aplicación
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          description: Nombre del repositorio y de la aplicación
          ui:autofocus: true
          ui:help: Solo minúsculas, números y guiones. Ej. my-app

  steps:
    - id: fetch
      name: Generar archivos del skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          repoOwner: ${{ appConfig.scaffolder.githubOrg }}

    - id: publish
      name: Publicar en GitHub
      action: publish:github:configured
      input:
        repoName: ${{ parameters.name }}
        description: Angular frontend - ${{ parameters.name }}
        gitCommitMessage: "chore: initial scaffold from angular-frontend template"
        topics:
          - angular
          - typescript
          - frontend

    - id: register
      name: Registrar en el catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repositorio en GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Ver en el catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
